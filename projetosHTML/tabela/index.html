<html>
    <head>

        <title>Exemplo Tabela</title>

    </head>
    <body>
        
        <table border="1">
            <tr>
                <th>SEGUNDA</th>
                <th>TERÇA</th>
                <th>QUARTA</th>
                <th>QUINTA</th>
                <th>SEXTA</th>
            </tr>

            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
                <td>5</td>
            </tr>

            <tr>
                <td>6</td>
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td>10</td>
            </tr>
            
            <tr>
                <td>11</td>
                <td>12</td>
                <td>13</td>
                <td>14</td>
                <td>15</td>
            </tr>

            <tr>
                <td colspan="2" align="center">16</td> 
                <!--
                Junta 2 colunas 
                align="center"
                centralizar o numero
                --> 
                <td>17</td>
                <td>18</td>
                <td rowspan="2">19</td>
                 <!--
                Junta 2 linhas
                -->
            </tr>

            <tr>
                <td>21</td>
                <td>22</td>
                <td>23</td>
                <td>24</td>
            </tr>

            
        </table>

        <!--
        <table> tag pra criar a tabela
        <table border="1"> estilização (vermelho nesse caso nao significa que é um erro)
        <tr> linhas da tabela
        <th> celula de titulo
        <td> celula
        <td colspan="2"> junção de colunas (sempre da esquerda pra direita)
        <td rowspan="2"> junção de linhas (dentro dos "" coloca o numero de celulas que quer juntar)
        <td colspan="2" align="center"> o "center" é pra centralizar o numero 
        -->
    </body>
</html>
